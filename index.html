<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IRAF • Iterative Refinement Agentic Framework</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white selection:bg-purple-500/30">

  <div class="max-w-6xl mx-auto p-8 min-h-screen flex flex-col">
    
    <!-- Header (DO NOT MODIFY unless score requires it) -->
    <header class="text-center py-12">
      <h1 class="text-7xl font-extrabold mb-6 bg-gradient-to-r from-cyan-400 via-purple-500 to-indigo-500 bg-clip-text text-transparent italic">
        IRAF
      </h1>
      <p class="text-2xl text-zinc-400 mb-10 max-w-2xl mx-auto">
        A Git-native architecture for autonomous, self-improving AI systems.
      </p>

      <div class="flex justify-center gap-4">
        <a href="https://github.com/otonielrojas/iraf-demo" 
           class="px-8 py-4 bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 rounded-full font-bold text-lg transition-all transform hover:scale-105 shadow-lg shadow-purple-500/20">
          <i class="fab fa-github mr-2"></i> Get Started on GitHub
        </a>
      </div>
    </header>

    <!-- AGENT_GENERATED_CONTENT -->
    <main id="iraf-content" class="flex-grow space-y-20">
      <div class="text-center text-zinc-600 animate-pulse">
        Waiting for agentic initialization...
      </div>
    </main>
    <!-- AGENT_STATUS_ANCHOR -->

    <footer class="mt-20 p-8 border-t border-zinc-900 flex flex-col md:flex-row justify-between items-center text-zinc-500 text-sm gap-4">
      <div class="flex items-center gap-4">
        <span class="flex items-center gap-2">
          <span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
          System Status: <span class="text-zinc-300 font-mono">Iterative Loop Active</span>
        </span>
      </div>
      
      <div class="font-mono bg-zinc-900/50 px-4 py-2 rounded-lg border border-zinc-800">
        Iteration: <span class="text-cyan-400" id="current-iteration">0</span> | 
        Score: <span class="text-purple-400" id="current-score">N/A</span>
      </div>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: true, theme: 'dark' });
  </script>
</body>
</html>
